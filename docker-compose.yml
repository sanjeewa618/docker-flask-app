services:
  db:
    image: postgres:17
    container_name: postgres-db
    restart: always

    env_file:
      - .env

    volumes:
      - postgres-data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

  web:
    build: .
    container_name: flask-app

    depends_on:
      - db

    env_file:
      - .env

    ports:
      - "5000:5000"

volumes:
  postgres-data: